services:
  postgres:
    image: postgres:13-alpine
    container_name: mto360_postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mto360_user
      POSTGRES_PASSWORD: mto360_secure_pass_2024
      POSTGRES_DB: mto360_production
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "28472:5432"
    volumes:
      - mto360_postgres_storage:/var/lib/postgresql/data
      - ./backend/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mto360_user -d mto360_production"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mto360_internal_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mto360_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://mto360_user:mto360_secure_pass_2024@postgres:5432/mto360_production
      SECRET_KEY: change-this-in-production-use-at-least-32-random-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: "http://localhost:38080"
      DEBUG: "false"
      TIMEZONE: Asia/Colombo
    ports:
      - "38100:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mto360_internal_net

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: mto360_frontend
    restart: unless-stopped
    ports:
      - "38080:80"
    depends_on:
      - backend
    networks:
      - mto360_internal_net

volumes:
  mto360_postgres_storage:
    driver: local

networks:
  mto360_internal_net:
    driver: bridge
    name: mto360_internal_net
